# Delve Configuration
# ─────────────────────
# All tunable settings for the taxonomy generation pipeline.
# Override via CLI flags: --model, --fast-model, --config <path>

models:
  # Main reasoning model — used for taxonomy generation and review.
  model: "openai/gpt-5.4-nano"

  # Fast/lightweight model — used for summarization, labeling, and taxonomy update.
  fast_llm: "openai/gpt-5.4-nano"

pipeline:
  # Maximum number of documents to process (0 = no limit).
  max_runs: 0

  # Number of documents to sample for processing (0 = use all).
  sample_size: 0

  # Size of minibatches for iterative taxonomy processing.
  batch_size: 10

  # Random seed for reproducibility (null = non-deterministic).
  random_seed: 4

taxonomy:
  # Maximum number of categories the LLM may produce.
  max_num_clusters: 8

  # Max words for cluster/category names.
  cluster_name_length: 10

  # Max words for cluster/category descriptions.
  cluster_description_length: 30

  # Max words for taxonomy suggestions.
  suggestion_length: 30

  # Max words for reasoning explanations in taxonomy output.
  explanation_length: 20

  # The use case description guiding taxonomy generation.
  use_case: >-
    Generate the taxonomy that can be used to label
    the user intent in the conversation.

summarization:
  # Skip summarization entirely (documents go directly to taxonomy generation).
  # When true, raw document content is used instead of summaries.
  skip: false

  # Max words for document summaries.
  summary_length: 20

  # Max words for summary explanations.
  explanation_length: 30

  # Max concurrent LLM requests during summarization (acts as a semaphore).
  max_concurrency: 5

labeling:
  # Fallback category when no taxonomy category fits.
  fallback_category: "Other"

  # Number of documents to sample for taxonomy review (null = uses batch_size).
  review_sample_size: null

output:
  # Max documents shown in the rich display table.
  max_displayed_documents: 20

  # Characters shown in document preview column.
  content_preview_length: 100

  # Default directory for output files.
  default_output_dir: "output"

  # Pipeline graph diagram filename.
  graph_filename: "graph.png"